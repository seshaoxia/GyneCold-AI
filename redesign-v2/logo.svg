<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#888888"/>
    </linearGradient>
  </defs>

  <!-- 图标：DNA 双螺旋 + 雪花 -->
  <g transform="translate(8, 12)">
    <!-- DNA 左链 -->
    <path d="M24 0 C24 10, 0 18, 0 28 C0 38, 24 46, 24 56" fill="none" stroke="#fff" stroke-width="1.8" opacity="0.6"/>
    <!-- DNA 右链 -->
    <path d="M0 0 C0 10, 24 18, 24 28 C24 38, 0 46, 0 56" fill="none" stroke="#888" stroke-width="1.8" opacity="0.6"/>

    <!-- 碱基对连线 -->
    <line x1="20" y1="4" x2="4" y2="4" stroke="#fff" stroke-width="0.8" opacity="0.25"/>
    <line x1="6" y1="14" x2="18" y2="14" stroke="#fff" stroke-width="0.8" opacity="0.25"/>
    <line x1="4" y1="24" x2="20" y2="24" stroke="#fff" stroke-width="0.8" opacity="0.25"/>
    <line x1="20" y1="32" x2="4" y2="32" stroke="#fff" stroke-width="0.8" opacity="0.25"/>
    <line x1="6" y1="42" x2="18" y2="42" stroke="#fff" stroke-width="0.8" opacity="0.25"/>
    <line x1="4" y1="52" x2="20" y2="52" stroke="#fff" stroke-width="0.8" opacity="0.25"/>

    <!-- 雪花（寒症象征） -->
    <g transform="translate(12, 28)" opacity="0.5">
      <!-- 六角雪花 -->
      <line x1="0" y1="-10" x2="0" y2="10" stroke="#fff" stroke-width="1"/>
      <line x1="-8.7" y1="-5" x2="8.7" y2="5" stroke="#fff" stroke-width="1"/>
      <line x1="-8.7" y1="5" x2="8.7" y2="-5" stroke="#fff" stroke-width="1"/>
      <!-- 分支 -->
      <line x1="0" y1="-10" x2="3" y2="-7" stroke="#fff" stroke-width="0.6"/>
      <line x1="0" y1="-10" x2="-3" y2="-7" stroke="#fff" stroke-width="0.6"/>
      <line x1="8.7" y1="5" x2="5.7" y2="4" stroke="#fff" stroke-width="0.6"/>
      <line x1="8.7" y1="5" x2="6.7" y2="7" stroke="#fff" stroke-width="0.6"/>
      <line x1="-8.7" y1="-5" x2="-5.7" y2="-4" stroke="#fff" stroke-width="0.6"/>
      <line x1="-8.7" y1="-5" x2="-6.7" y2="-7" stroke="#fff" stroke-width="0.6"/>
    </g>
  </g>

  <!-- 文字 -->
  <text x="44" y="38" font-family="'Inter','Noto Sans SC',sans-serif" font-size="22" font-weight="700" fill="url(#g)" letter-spacing="-0.5">GyneCold</text>
  <text x="44" y="58" font-family="'Inter','Noto Sans SC',sans-serif" font-size="11" fill="#666" letter-spacing="2.5" font-weight="300">AI RESEARCH PLATFORM</text>
</svg>
