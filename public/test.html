<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centering Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; background: #000; color: #fff; }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 60px 24px;
      text-align: center;
    }
    .box {
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 40px;
      margin-bottom: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .cell {
      background: #111;
      border: 1px solid #333;
      padding: 20px;
      border-radius: 8px;
    }
    .marker {
      position: fixed;
      top: 0;
      width: 1px;
      height: 100vh;
      background: red;
      z-index: 9999;
    }
    .marker-left { left: 0; }
    .marker-right { right: 0; }
    .marker-center { left: 50%; transform: translateX(-50%); background: lime; }
  </style>
</head>
<body>
  <div class="marker marker-left"></div>
  <div class="marker marker-right"></div>
  <div class="marker marker-center"></div>

  <div class="container">
    <h1 style="font-size:48px;margin-bottom:16px;">Center Test</h1>
    <p style="color:#888;margin-bottom:40px;">If this text is not centered between the red lines, the problem is not in the React app.</p>

    <div class="box">
      <h2 style="margin-bottom:8px;">研究数据全景监控</h2>
      <p style="color:#888;">实时追踪 AI 模型运行状态，全面掌握妇科寒症研究数据动态</p>
    </div>

    <div class="grid">
      <div class="cell">Card 1</div>
      <div class="cell">Card 2</div>
      <div class="cell">Card 3</div>
      <div class="cell">Card 4</div>
    </div>
  </div>
</body>
</html>
