<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · GyneCold AI</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      background: #000; color: #a0a0a0;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .grid-overlay {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .auth-container {
      position: relative; z-index: 1;
      width: 100%; max-width: 400px; padding: 24px;
    }
    .auth-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px; padding: 40px 32px;
      backdrop-filter: blur(24px);
    }
    .auth-title {
      font-size: 24px; font-weight: 700; color: #fff;
      text-align: center; margin-bottom: 8px;
    }
    .auth-sub {
      text-align: center; font-size: 14px; color: #666;
      margin-bottom: 32px;
    }
    .auth-sub a { color: #888; text-decoration: none; }
    .auth-sub a:hover { color: #fff; }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-size: 13px; color: #888; margin-bottom: 6px;
    }
    .form-group input {
      width: 100%; padding: 12px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; color: #fff; font-size: 14px;
      outline: none; transition: border-color 0.3s;
    }
    .form-group input:focus { border-color: rgba(255,255,255,0.2); }
    .form-group input::placeholder { color: #444; }
    .auth-btn {
      width: 100%; padding: 12px; border-radius: 10px;
      background: #fff; color: #000; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.3s; margin-top: 8px;
    }
    .auth-btn:hover { background: #e5e5e5; }
    .auth-toggle {
      text-align: center; margin-top: 20px; font-size: 13px;
    }
    .auth-toggle a { color: #888; cursor: pointer; text-decoration: none; }
    .auth-toggle a:hover { color: #fff; }
    .auth-error {
      background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.2);
      border-radius: 8px; padding: 10px 14px; font-size: 13px;
      color: #ff6b6b; margin-bottom: 16px; display: none;
    }
    .back-link {
      display: block; text-align: center; margin-top: 20px;
      font-size: 13px; color: #555;
    }
    .back-link a { color: #666; text-decoration: none; }
    .back-link a:hover { color: #fff; }
    .brand {
      text-align: center; margin-bottom: 32px;
    }
    .brand .logo {
      font-size: 20px; font-weight: 700; color: #fff;
      text-decoration: none;
    }
    .brand span { color: #888; }
  </style>
</head>
<body>
  <div class="grid-overlay"></div>
  <div class="auth-container">
    <div class="auth-card">
      <div class="brand">
        <a href="index.html" class="logo">
          <img src="logo.svg" alt="GyneCold AI" height="24" style="vertical-align:middle;margin-right:6px;">
          GyneCold<span> AI</span>
        </a>
      </div>
      <div class="auth-title" id="authTitle">登录</div>
      <div class="auth-sub" id="authSub">
        还没有账号？<a href="#" id="toggleAuth">立即注册</a>
      </div>

      <div class="auth-error" id="authError"></div>

      <form id="authForm" onsubmit="return handleAuth(event)">
        <div class="form-group" id="nameGroup" style="display:none;">
          <label>姓名</label>
          <input type="text" id="regName" placeholder="你的姓名">
        </div>
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="username" placeholder="输入用户名" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="password" placeholder="输入密码" required>
        </div>
        <div class="form-group" id="password2Group" style="display:none;">
          <label>确认密码</label>
          <input type="password" id="password2" placeholder="再次输入密码" required>
        </div>
        <div class="form-group" id="apiKeyGroup" style="display:none;">
          <label>API Key <span style="color:#ff6b6b;">*</span>
            <span style="font-weight:normal;color:#555;font-size:12px;">
              （<a href="https://platform.deepseek.com/api_keys" target="_blank" style="color:#888;">DeepSeek</a> / <a href="https://openrouter.ai/keys" target="_blank" style="color:#888;">OpenRouter</a>）
            </span>
          </label>
          <input type="password" id="apiKey" placeholder="sk-... 必须填写自己的 API Key" required>
          <div style="font-size:11px;color:#444;margin-top:4px;">注册后不可修改，请妥善保管</div>
        </div>
        <button type="submit" class="auth-btn" id="authBtn">登录</button>
      </form>

      <div class="auth-toggle">
        <a href="https://platform.deepseek.com/api_keys" target="_blank" style="color:#555;font-size:13px;">还没有 API Key？去 DeepSeek 申请 →</a>
      </div>
    </div>
    <div class="back-link"><a href="index.html">← 返回首页</a></div>
  </div>

  <script>
    let isLogin = true;
    const redirectTo = new URLSearchParams(window.location.search).get('redirect') || 'chat.html';
    // TODO: 部署后替换为实际服务器地址
    const API_BASE = 'http://192.168.2.145:5001';

    document.getElementById('toggleAuth').addEventListener('click', (e) => {
      e.preventDefault();
      isLogin = !isLogin;
      document.getElementById('authTitle').textContent = isLogin ? '登录' : '注册';
      document.getElementById('authSub').innerHTML = isLogin
        ? '还没有账号？<a href="#" id="toggleAuth">立即注册</a>'
        : '已有账号？<a href="#" id="toggleAuth">立即登录</a>';
      document.getElementById('nameGroup').style.display = isLogin ? 'none' : 'block';
      document.getElementById('password2Group').style.display = isLogin ? 'none' : 'block';
      document.getElementById('apiKeyGroup').style.display = isLogin ? 'none' : 'block';
      document.getElementById('apiKey').required = !isLogin;
      document.getElementById('password2').required = !isLogin;
      document.getElementById('authBtn').textContent = isLogin ? '登录' : '注册';
      document.getElementById('authError').style.display = 'none';
      document.getElementById('toggleAuth').addEventListener('click', arguments.callee);
    });

    function showError(msg) {
      const el = document.getElementById('authError');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function showLoading(loading) {
      const btn = document.getElementById('authBtn');
      btn.disabled = loading;
      btn.textContent = loading ? (isLogin ? '登录中...' : '注册中...') : (isLogin ? '登录' : '注册');
    }

    async function handleAuth(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const password2 = document.getElementById('password2').value.trim();
      const name = document.getElementById('regName').value.trim() || username;
      const apiKey = document.getElementById('apiKey').value.trim();

      if (!username || !password) {
        showError('请填写用户名和密码');
        return false;
      }

      if (!isLogin && !apiKey) {
        showError('请填写你的 API Key（DeepSeek / OpenRouter）');
        return false;
      }

      if (!isLogin && password !== password2) {
        showError('两次输入的密码不一致');
        return false;
      }

      showLoading(true);
      try {
        const endpoint = isLogin ? '/api/auth/login' : '/api/auth/register';
        const body = isLogin
          ? { username, password }
          : { username, password, name, api_key: apiKey };

        const resp = await fetch(API_BASE + endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await resp.json();

        if (!resp.ok) {
          showError(data.error || '操作失败');
          return false;
        }

        if (isLogin) {
          // 登录成功，保存用户信息到 localStorage
          localStorage.setItem('gynecold_user', JSON.stringify(data.user));
          window.location.href = redirectTo;
        } else {
          // 注册成功，自动登录
          localStorage.setItem('gynecold_user', JSON.stringify({
            username, name, api_key: apiKey,
          }));
          window.location.href = redirectTo;
        }
      } catch (err) {
        showError('无法连接到服务器，请检查网络或联系管理员');
      } finally {
        showLoading(false);
      }
      return false;
    }
  </script>
</body>
</html>
