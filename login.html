<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · GyneCold AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      background: #000; color: #a0a0a0;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .grid-overlay {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .auth-container {
      position: relative; z-index: 1;
      width: 100%; max-width: 400px; padding: 24px;
    }
    .auth-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px; padding: 40px 32px;
      backdrop-filter: blur(24px);
    }
    .auth-title {
      font-size: 24px; font-weight: 700; color: #fff;
      text-align: center; margin-bottom: 8px;
    }
    .auth-sub {
      text-align: center; font-size: 14px; color: #666;
      margin-bottom: 32px;
    }
    .auth-sub a { color: #888; text-decoration: none; }
    .auth-sub a:hover { color: #fff; }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-size: 13px; color: #888; margin-bottom: 6px;
    }
    .form-group input {
      width: 100%; padding: 12px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; color: #fff; font-size: 14px;
      outline: none; transition: border-color 0.3s;
    }
    .form-group input:focus { border-color: rgba(255,255,255,0.2); }
    .form-group input::placeholder { color: #444; }
    .auth-btn {
      width: 100%; padding: 12px; border-radius: 10px;
      background: #fff; color: #000; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.3s; margin-top: 8px;
    }
    .auth-btn:hover { background: #e5e5e5; }
    .auth-toggle {
      text-align: center; margin-top: 20px; font-size: 13px;
    }
    .auth-toggle a { color: #888; cursor: pointer; text-decoration: none; }
    .auth-toggle a:hover { color: #fff; }
    .auth-error {
      background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.2);
      border-radius: 8px; padding: 10px 14px; font-size: 13px;
      color: #ff6b6b; margin-bottom: 16px; display: none;
    }
    .back-link {
      display: block; text-align: center; margin-top: 20px;
      font-size: 13px; color: #555;
    }
    .back-link a { color: #666; text-decoration: none; }
    .back-link a:hover { color: #fff; }
    .brand {
      text-align: center; margin-bottom: 32px;
    }
    .brand .logo {
      font-size: 20px; font-weight: 700; color: #fff;
      text-decoration: none;
    }
    .brand span { color: #888; }
  </style>
</head>
<body>
  <div class="grid-overlay"></div>
  <div class="auth-container">
    <div class="auth-card">
      <div class="brand">
        <a href="index.html" class="logo">GyneCold<span> AI</span></a>
      </div>
      <div class="auth-title" id="authTitle">登录</div>
      <div class="auth-sub" id="authSub">
        还没有账号？<a href="#" id="toggleAuth">立即注册</a>
      </div>

      <div class="auth-error" id="authError"></div>

      <form id="authForm" onsubmit="return handleAuth(event)">
        <div class="form-group" id="nameGroup" style="display:none;">
          <label>姓名</label>
          <input type="text" id="regName" placeholder="你的姓名">
        </div>
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="username" placeholder="输入用户名" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="password" placeholder="输入密码" required>
        </div>
        <button type="submit" class="auth-btn" id="authBtn">登录</button>
      </form>

      <div class="auth-toggle">
        <a href="chat.html" id="skipLink" style="color:#555;">跳过登录，直接使用 →</a>
      </div>
    </div>
    <div class="back-link"><a href="index.html">← 返回首页</a></div>
  </div>

  <script>
    let isLogin = true;
    const redirectTo = new URLSearchParams(window.location.search).get('redirect') || 'chat.html';

    document.getElementById('toggleAuth').addEventListener('click', (e) => {
      e.preventDefault();
      isLogin = !isLogin;
      document.getElementById('authTitle').textContent = isLogin ? '登录' : '注册';
      document.getElementById('authSub').innerHTML = isLogin
        ? '还没有账号？<a href="#" id="toggleAuth">立即注册</a>'
        : '已有账号？<a href="#" id="toggleAuth">立即登录</a>';
      document.getElementById('nameGroup').style.display = isLogin ? 'none' : 'block';
      document.getElementById('authBtn').textContent = isLogin ? '登录' : '注册';
      document.getElementById('authError').style.display = 'none';
      document.getElementById('toggleAuth').addEventListener('click', arguments.callee);
    });

    function showError(msg) {
      const el = document.getElementById('authError');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function handleAuth(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const name = document.getElementById('regName').value.trim() || username;

      if (!username || !password) {
        showError('请填写用户名和密码');
        return false;
      }

      const users = JSON.parse(localStorage.getItem('gynecold_users') || '{}');

      if (isLogin) {
        if (!users[username]) {
          showError('用户不存在，请先注册');
          return false;
        }
        if (users[username].password !== password) {
          showError('密码错误');
          return false;
        }
        localStorage.setItem('gynecold_user', JSON.stringify({
          username, name: users[username].name || username,
        }));
        window.location.href = redirectTo;
      } else {
        if (users[username]) {
          showError('用户名已存在');
          return false;
        }
        users[username] = { password, name, created_at: new Date().toISOString() };
        localStorage.setItem('gynecold_users', JSON.stringify(users));
        localStorage.setItem('gynecold_user', JSON.stringify({ username, name }));
        window.location.href = redirectTo;
      }
      return false;
    }
  </script>
</body>
</html>
