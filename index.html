<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GyneCold AI - 妇科寒症智能辅助诊疗研究平台">
  <title>GyneCold AI — 妇科寒症智能研究平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { width: 100%; background: #000; }
    body {
      width: 100%;
      margin: 0 auto;
      font-family: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #000;
      color: #a0a0a0;
      overflow-x: hidden;
    }

    /* ---- Navbar ---- */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      padding: 20px 24px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.5s;
    }
    .navbar.scrolled {
      background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.04); padding: 12px 24px;
    }
    .navbar-inner {
      width: 100%; max-width: 1200px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .navbar-brand {
      display: flex; align-items: center; gap: 10px;
      font-weight: 600; font-size: 18px; color: #fff; text-decoration: none;
    }
    .navbar-brand-icon {
      width: 32px; height: 32px; border-radius: 8px; background: #fff;
      display: flex; align-items: center; justify-content: center;
    }
    .navbar-brand-icon svg { width: 16px; height: 16px; color: #000; }
    .navbar-brand span { color: #888; }
    .navbar-links { display: flex; align-items: center; gap: 24px; }
    .navbar-links a { color: #666; text-decoration: none; font-size: 14px; transition: color 0.3s; }
    .navbar-links a:hover { color: #fff; }
    .btn-white {
      padding: 10px 20px; border-radius: 999px; background: #fff; color: #000;
      font-size: 13px; font-weight: 500; text-decoration: none;
      transition: background 0.3s; border: none; cursor: pointer;
    }
    .btn-white:hover { background: #e5e5e5; }
    @media (max-width: 768px) { .navbar-links { display: none; } }

    /* ---- Hero ---- */
    .hero {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 100px 24px 60px; position: relative;
    }
    .hero-content {
      max-width: 900px; margin: 0 auto;
      display: flex; flex-direction: column; align-items: center; text-align: center;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 16px; border-radius: 999px;
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(20px); margin-bottom: 40px;
    }
    .pulse-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #fff;
      box-shadow: 0 0 6px rgba(255,255,255,0.4), 0 0 12px rgba(255,255,255,0.2);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.8); }
    }
    .hero-badge span {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: #999; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .hero h1 {
      font-size: clamp(40px, 8vw, 96px); font-weight: 700;
      letter-spacing: -0.02em; line-height: 1; color: #fff; margin-bottom: 24px;
    }
    .hero h1 .gradient {
      background: linear-gradient(135deg, #fff 0%, #888 50%, #ccc 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      font-size: 18px; line-height: 1.7; color: #666; max-width: 640px; margin-bottom: 48px;
    }
    @media (max-width: 768px) { .hero p { font-size: 16px; } }
    .hero-buttons { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .btn-outline {
      padding: 14px 32px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08); color: #999;
      font-size: 14px; font-weight: 500; text-decoration: none;
      transition: all 0.3s; background: transparent;
    }
    .btn-outline:hover { border-color: rgba(255,255,255,0.2); color: #fff; }
    .btn-arrow { display: inline-flex; align-items: center; gap: 8px; }

    /* ---- Stats ---- */
    .hero-stats {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 16px; width: 100%; max-width: 720px; margin-top: 64px;
    }
    @media (max-width: 640px) { .hero-stats { grid-template-columns: 1fr; } }
    .stat-card {
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px; padding: 24px 20px; text-align: center;
      backdrop-filter: blur(20px); transition: all 0.4s;
    }
    .stat-card:hover {
      border-color: rgba(255,255,255,0.12); background: rgba(255,255,255,0.04);
    }
    .stat-card svg { color: #888; margin-bottom: 8px; }
    .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; color: #fff; }
    .stat-label { font-size: 12px; color: #666; margin-top: 4px; }
    .stat-sub { font-size: 10px; color: #555; }

    /* ---- 3D Background ---- */
    #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* ---- Grid overlay ---- */
    .grid-overlay {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ---- Scroll indicator ---- */
    .scroll-indicator {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    }
    .scroll-indicator-inner {
      width: 20px; height: 32px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.06);
      display: flex; justify-content: center; padding-top: 6px;
    }
    .scroll-dot {
      width: 4px; height: 6px; border-radius: 999px; background: #fff;
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(8px); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #000; }
  ::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: #444; }

  /* ---- Chat Widget ---- */
  .chat-widget {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
  }
  .chat-toggle {
    width: 52px; height: 52px; border-radius: 50%;
    background: #fff; color: #000; border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(255,255,255,0.15);
  }
  .chat-toggle:hover { transform: scale(1.05); }
  .chat-panel {
    position: absolute; bottom: 64px; right: 0;
    width: 380px; height: 520px;
    background: rgba(0,0,0,0.92); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px; backdrop-filter: blur(24px);
    display: none; flex-direction: column; overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  .chat-panel.open { display: flex; }
  @media (max-width: 480px) {
    .chat-panel { width: calc(100vw - 32px); right: -8px; height: 460px; }
  }
  .chat-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .chat-close {
    background: none; border: none; color: #666; font-size: 16px;
    cursor: pointer; padding: 4px;
  }
  .chat-close:hover { color: #fff; }
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 12px 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .chat-msg { display: flex; }
  .chat-msg.user { justify-content: flex-end; }
  .chat-msg-bubble {
    max-width: 85%; padding: 10px 14px; border-radius: 12px;
    font-size: 13px; line-height: 1.6; word-break: break-word;
  }
  .chat-msg.assistant .chat-msg-bubble {
    background: rgba(255,255,255,0.06); color: #ccc;
    border-bottom-left-radius: 4px;
  }
  .chat-msg.user .chat-msg-bubble {
    background: #fff; color: #000;
    border-bottom-right-radius: 4px;
  }
  .chat-msg-bubble code {
    background: rgba(255,255,255,0.08); padding: 1px 5px;
    border-radius: 4px; font-size: 12px;
  }
  .chat-msg-bubble a { color: #8af; text-decoration: none; }
  .chat-msg-bubble a:hover { text-decoration: underline; }
  .chat-msg-bubble strong { color: #fff; }
  .chat-input-area {
    display: flex; gap: 8px; padding: 10px 12px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .chat-input {
    flex: 1; padding: 10px 14px; border-radius: 10px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
    color: #fff; font-size: 13px; outline: none;
  }
  .chat-input:focus { border-color: rgba(255,255,255,0.2); }
  .chat-input::placeholder { color: #555; }
  .chat-send {
    padding: 10px 18px; border-radius: 10px;
    background: #fff; color: #000; border: none;
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  .chat-send:hover { background: #e5e5e5; }
  .chat-send:disabled { opacity: 0.5; cursor: not-allowed; }
  .chat-loading { display: flex; gap: 4px; padding: 10px 14px; }
  .chat-loading span {
    width: 6px; height: 6px; border-radius: 50%; background: #666;
    animation: chatBounce 1.4s infinite;
  }
  .chat-loading span:nth-child(2) { animation-delay: 0.2s; }
  .chat-loading span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes chatBounce {
    0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  </style>
</head>
<body>

  <!-- 3D Canvas -->
  <canvas id="bg-canvas"></canvas>
  <div class="grid-overlay"></div>

  <!-- Chat Widget -->
  <div class="chat-widget" id="chatWidget">
    <button class="chat-toggle" id="chatToggle" onclick="toggleChat()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </button>
    <div class="chat-panel" id="chatPanel">
      <div class="chat-panel-header">
        <div>
          <div style="font-weight:600;font-size:14px;color:#fff;">AI 分析助手</div>
          <div style="font-size:11px;color:#888;">差异表达分析 · 中医研究</div>
        </div>
        <button class="chat-close" onclick="toggleChat()">✕</button>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="chat-msg assistant">

        </div>

               onkeydown="if(event.key==='Enter')sendChat()">
        <button class="chat-send" onclick="sendChat()">发送</button>
      </div>
    </div>
  </div>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="#" class="navbar-brand">
        <div class="navbar-brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </div>
        GyneCold<span> AI</span>
      </a>
      <div class="navbar-links">
        <a href="#" class="btn-white">接入平台</a>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-content">
      <div class="hero-badge">
        <span class="pulse-dot"></span>
        <span>AI Research Platform v2.0</span>
      </div>

      <h1>妇科寒症<br><span class="gradient">智能研究平台</span></h1>

      <p>基于大语言模型与多模态感知技术，构建妇科寒症精准辨证、智能辅助诊疗与机制研究一体化的 AI 科研平台</p>

      <div class="hero-buttons">
        <a href="#" class="btn-white btn-arrow">
          开始研究 <span style="transition:transform .3s;">→</span>
        </a>
        <a href="#" class="btn-outline">查看文档</a>
      </div>

      <div class="hero-stats">
        <div class="stat-card">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          <div class="stat-value">98.7%</div>
          <div class="stat-label">寒症证型识别</div>
          <div class="stat-sub">准确率</div>
        </div>
        <div class="stat-card">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/></svg>
          <div class="stat-value">12,000+</div>
          <div class="stat-label">知识库条目</div>
          <div class="stat-sub">文献支撑</div>
        </div>
        <div class="stat-card">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="4" width="16" height="16" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="12" y2="17"/></svg>
          <div class="stat-value">多模型</div>
          <div class="stat-label">AI 推理引擎</div>
          <div class="stat-sub">支持各大模型</div>
        </div>
      </div>
    </div>

    <div class="scroll-indicator">
      <div class="scroll-indicator-inner"><div class="scroll-dot"></div></div>
    </div>
  </section>

  <!-- Three.js background -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.167.0/build/three.module.js"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const canvas = document.getElementById('bg-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x000000, 5, 20);
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 50);
    camera.position.z = 8;

    // DNA helix
    const helixGroup = new THREE.Group();
    const turns = 4, height = 8, radius = 1.8, segments = turns * 40;
    const pts1 = [], pts2 = [];

    for (let i = 0; i <= segments; i++) {
      const t = i / segments;
      const angle = t * Math.PI * 2 * turns;
      const y = (t - 0.5) * height;
      pts1.push(new THREE.Vector3(Math.cos(angle) * radius, y, Math.sin(angle) * radius));
      pts2.push(new THREE.Vector3(Math.cos(angle + Math.PI) * radius, y, Math.sin(angle + Math.PI) * radius));

      if (i % 5 === 0) {
        const s1 = new THREE.Mesh(
          new THREE.SphereGeometry(0.06, 8, 8),
          new THREE.MeshStandardMaterial({ color: '#ffffff', emissive: '#ffffff', emissiveIntensity: 0.3 })
        );
        s1.position.copy(pts1[pts1.length - 1]);
        helixGroup.add(s1);

        const s2 = new THREE.Mesh(
          new THREE.SphereGeometry(0.06, 8, 8),
          new THREE.MeshStandardMaterial({ color: '#888888', emissive: '#888888', emissiveIntensity: 0.3 })
        );
        s2.position.copy(pts2[pts2.length - 1]);
        helixGroup.add(s2);
      }
    }

    const line1 = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(pts1),
      new THREE.LineBasicMaterial({ color: '#ffffff', transparent: true, opacity: 0.35 })
    );
    const line2 = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(pts2),
      new THREE.LineBasicMaterial({ color: '#888888', transparent: true, opacity: 0.35 })
    );
    helixGroup.add(line1, line2);
    scene.add(helixGroup);

    // Particles
    const particlesGeom = new THREE.BufferGeometry();
    const count = 150;
    const positions = new Float32Array(count * 3);
    const speeds = [];
    for (let i = 0; i < count; i++) {
      positions[i * 3] = (Math.random() - 0.5) * 14;
      positions[i * 3 + 1] = (Math.random() - 0.5) * 10;
      positions[i * 3 + 2] = (Math.random() - 0.5) * 8;
      speeds.push(0.002 + Math.random() * 0.006);
    }
    particlesGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particles = new THREE.Points(
      particlesGeom,
      new THREE.PointsMaterial({ color: '#ffffff', size: 0.015, transparent: true, opacity: 0.25 })
    );
    scene.add(particles);

    scene.add(new THREE.AmbientLight(0xffffff, 0.15));
    scene.add(new THREE.PointLight(0xffffff, 0.3, 20, 2));

    // Animation loop
    function animate(time) {
      requestAnimationFrame(animate);
      helixGroup.rotation.y = Math.sin(time * 0.00015) * 0.3;
      helixGroup.position.y = Math.sin(time * 0.0003) * 0.5;

      const pos = particles.geometry.attributes.position;
      for (let i = 0; i < count; i++) {
        pos.array[i * 3 + 1] += speeds[i];
        if (pos.array[i * 3 + 1] > 5) pos.array[i * 3 + 1] = -5;
        if (pos.array[i * 3 + 1] < -5) pos.array[i * 3 + 1] = 5;
      }
      pos.needsUpdate = true;

      renderer.render(scene, camera);
    }
    requestAnimationFrame(animate);

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>

  <!-- Navbar scroll -->
  <script>
    const AGENT_API = 'http://192.168.2.145:5001';
    const USER_ID = 'gynecold-' + Math.random().toString(36).slice(2, 8);

    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20);
    }, { passive: true });

    function toggleChat() {
      document.getElementById('chatPanel').classList.toggle('open');
      if (document.getElementById('chatPanel').classList.contains('open')) {
        document.getElementById('chatInput').focus();
      }
    }

    async function sendChat() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      addChatMsg('user', text);

      const btn = document.querySelector('.chat-send');
      btn.disabled = true;
      btn.textContent = '分析中...';

      // 显示加载动画
      const loadingId = showLoading();

      try {
        const resp = await fetch(`${AGENT_API}/api/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, user_id: USER_ID }),
        });
        removeLoading(loadingId);
        const data = await resp.json();
        if (data.error) {
          addChatMsg('assistant', '❌ ' + data.error);
        } else {
          addChatMsg('assistant', formatChatMsg(data.reply));
        }
      } catch {
        removeLoading(loadingId);
        addChatMsg('assistant', '❌ 无法连接到 AI Agent 服务，请确认服务已启动。');
      } finally {
        btn.disabled = false;
        btn.textContent = '发送';
      }
    }

    function addChatMsg(role, html) {
      const container = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.className = 'chat-msg ' + role;
      const bubble = document.createElement('div');
      bubble.className = 'chat-msg-bubble';
      bubble.innerHTML = html;
      div.appendChild(bubble);
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function showLoading() {
      const container = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.className = 'chat-msg assistant';
      div.id = 'loading-' + Date.now();
      div.innerHTML = '<div class="chat-loading"><span></span><span></span><span></span></div>';
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
      return div.id;
    }

    function removeLoading(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    function formatChatMsg(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`(.+?)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>')
        .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank">$1</a>');
    }
  </script>
</body>
</html>
